<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>圓錐曲線 3D 精確解析教具</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #050505; font-family: system-ui, sans-serif; color: #eee; }
        
        /* 標題區域：實色背景防止捲動重疊 */
        .main-title {
            position: absolute; 
            top: 0; left: 0; z-index: 100;
            width: 210px; height: 75px; 
            padding: 18px 0 0 18px;
            background: #0f0f0f; 
            font-size: 1.5em; font-weight: bold; color: #00ffcc;
            text-shadow: 0 0 10px rgba(0,255,204,0.5); pointer-events: none;
        }

        /* 快速切換按鈕樣式 */
        .preset-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .preset-btn { 
            flex: 1 1 calc(50% - 6px); 
            background: #222; border: 1px solid #444; color: #00ffcc; 
            font-size: 11px; padding: 8px 2px; cursor: pointer; border-radius: 4px;
            transition: all 0.2s;
        }
        .preset-btn:active { background: #00ffcc; color: #000; }
        .reset-btn { background: #444; color: #fff; font-weight: bold; border: 1px solid #666; }

        /* UI 選單 */
        #ui { 
            position: absolute; top: 0; left: 0; bottom: 0;
            background: rgba(15, 15, 15, 0.98); padding: 75px 12px 12px 12px; 
            width: 210px; border-right: 1px solid #444; 
            z-index: 10; overflow-y: auto; 
        }
        .section-title {
            font-size: 0.85em; color: #888; margin-bottom: 12px;
            border-left: 2px solid #00ffcc; padding-left: 8px; font-weight: bold;
        }
        .type-label { 
            font-size: 1.2em; color: #00ffcc; text-align: center; 
            font-weight: bold; padding: 6px; border-bottom: 1px solid #333; 
            margin-bottom: 8px; background: rgba(0,0,0,0.3);
        }
        .param-group { margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        label { font-size: 11px; color: #999; }
        input[type=number] { 
            width: 55px; background: #222; border: 1px solid #555; 
            color: #00ffcc; border-radius: 3px; padding: 2px; font-size: 11px;
        }
        
        /* 增加滑桿軌道高度，讓視覺與觸控更明確 */
        input[type=range] { 
            width: 100%; margin: 12px 0; cursor: pointer; 
            height: 18px; 
            touch-action: pan-y; /* 告訴瀏覽器這區塊允許上下捲動頁面 */
        }

        #company-logo {
            position: absolute; top: 15px; right: 15px;
            width: 70px; height: auto; z-index: 110; pointer-events: none;
        }

        #preview-box { 
            position: absolute; bottom: 20px; right: 20px; 
            background: rgba(0,0,0,0.92); padding: 10px; 
            border-radius: 8px; border: 1px solid #555; z-index: 5;
            display: flex; flex-direction: column;
        }

        @media (max-width: 768px) {
            .main-title { width: auto; height: auto; background: none; left: 15px; top: 15px; font-size: 1.2em; padding: 0; }
            #company-logo { width: 45px; opacity: 0.9; }
            canvas { height: 65vh !important; }
            #ui { top: 65vh; left: 0; width: 60%; height: 35vh; bottom: 0; background: #000; padding: 10px 8px 30px 8px; overflow-y: auto; }
            #preview-box { top: 65vh; right: 0; left: auto; bottom: 0; width: 40%; height: 35vh; background: #050505; border-radius: 0; }
            .type-label { font-size: 1em; padding: 4px; margin-bottom: 0; }
            .section-title { margin-bottom: 8px; font-size: 0.75em; }
            .param-group { margin-bottom: 8px; padding-bottom: 4px; }
        }
    </style>
</head>
<body>

<div class="main-title">圓錐曲線模型</div>

<div id="ui">
    <div class="section-title">快速切換</div>
    <div class="preset-group">
        <button class="preset-btn reset-btn" onclick="applyPreset(30, 90, 2.0, 0, 0)">RESET</button>
        <button class="preset-btn" onclick="applyPreset(30, 60, 0.0, 0, 0)">一個點</button>
        <button class="preset-btn" onclick="applyPreset(30, 90, 4.0, 0, 0)">圓形</button>
        <button class="preset-btn" onclick="applyPreset(30, 60, 4.0, 0, 0)">橢圓形</button>
        <button class="preset-btn" onclick="applyPreset(30, 30, 4.0, 0, 0)">拋物線</button>
        <button class="preset-btn" onclick="applyPreset(30, 15, 2.0, 0, 0)">雙曲線</button>
        <button class="preset-btn" onclick="applyPreset(30, 30, 0.0, 0, 0)">一條直線</button>
        <button class="preset-btn" onclick="applyPreset(30, 15, 0.0, 0, 0)">兩相交線</button>
    </div>

    <div class="section-title">數據設定</div>
    <div class="param-group">
        <div class="label-row"><label>母線夾角 (α):</label><input type="number" id="alphaN" value="30"></div>
        <input type="range" id="alphaS" min="5" max="85" step="0.1" value="30">
    </div>
    <div class="param-group">
        <div class="label-row"><label>平面夾角 (β):</label><input type="number" id="betaN" value="90"></div>
        <input type="range" id="betaS" min="0" max="180" step="0.1" value="90">
    </div>
    <div class="param-group">
        <div class="label-row"><label>垂直位移 (Y):</label><input type="number" id="yN" value="2.0"></div>
        <input type="range" id="yS" min="-10" max="10" step="0.1" value="2.0">
    </div>
    <div class="param-group">
        <div class="label-row"><label>水平位移 (X):</label><input type="number" id="xN" value="0.0"></div>
        <input type="range" id="xS" min="-10" max="10" step="0.1" value="0.0">
    </div>
    <div class="param-group">
        <div class="label-row"><label>前後位移 (Z):</label><input type="number" id="zN" value="0.0"></div>
        <input type="range" id="zS" min="-10" max="10" step="0.1" value="0.0">
    </div>
</div>

<img id="company-logo" src="company-logo.png" alt="Company Logo">

<div id="preview-box">
    <div class="type-label" id="curveType">圓</div>
    <div id="preview-container">
        <div style="font-size: 9px; margin-bottom:2px; text-align:center; color:#999;">截面圖形</div>
        <canvas id="pCanvas" width="220" height="220"></canvas>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    const scene = new THREE.Scene();
    const getIsMobile = () => window.innerWidth <= 768;
    let isMobile = getIsMobile();
    const aspect = isMobile ? (window.innerWidth / (window.innerHeight * 0.65)) : ((window.innerWidth - 210) / window.innerHeight);
    const camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.GridHelper(30, 60, 0x222222, 0x222222));
    let topCone, bottomCone;
    const coneMat = new THREE.MeshPhongMaterial({ color: 0x3498db, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
    const planeGroup = new THREE.Group();
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(35,35), new THREE.MeshPhongMaterial({color:0xff4757, side:THREE.DoubleSide, transparent:true, opacity:0.6}));
    plane.rotation.x = Math.PI/2;
    planeGroup.add(plane);
    scene.add(planeGroup);
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);

    if (isMobile) { camera.position.set(32, 22, 32); } 
    else { camera.position.set(25, 18, 25); }
    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    const params = ['alpha', 'beta', 'x', 'y', 'z'];

    window.applyPreset = function(a, b, y, x, z) {
        document.getElementById('alphaN').value = a; document.getElementById('alphaS').value = a;
        document.getElementById('betaN').value = b; document.getElementById('betaS').value = b;
        document.getElementById('yN').value = y; document.getElementById('yS').value = y;
        document.getElementById('xN').value = x; document.getElementById('xS').value = x;
        document.getElementById('zN').value = z; document.getElementById('zS').value = z;
        update();
    }
    
    function update() {
        const a = parseFloat(document.getElementById('alphaN').value);
        const b = parseFloat(document.getElementById('betaN').value);
        const px = parseFloat(document.getElementById('xN').value);
        const py = parseFloat(document.getElementById('yN').value);
        const pz = parseFloat(document.getElementById('zN').value);

        if (topCone) { scene.remove(topCone); scene.remove(bottomCone); }
        const radA = a * Math.PI/180;
        const h = 12; 
        const geom = new THREE.ConeGeometry(h*Math.tan(radA), h, 128, 1, true);
        geom.translate(0, -h/2, 0); 
        topCone = new THREE.Mesh(geom, coneMat);
        bottomCone = new THREE.Mesh(geom, coneMat); bottomCone.rotation.x = Math.PI;
        scene.add(topCone, bottomCone);

        const radB_rot = (90 - b) * (Math.PI/180);
        planeGroup.rotation.x = radB_rot;
        planeGroup.position.set(px, py, pz);

        const eb = b > 90 ? 180 - b : b;
        const ny = Math.cos(radB_rot), nz = Math.sin(radB_rot);
        const dist = Math.abs(py*ny + pz*nz); 
        
        const passV = dist < 0.05;
        const tol = 0.5;
        
        let type = "";
        if (passV) {
            if (Math.abs(eb - a) < tol) type = "一條直線";
            else if (eb > a) type = "一個點";
            else type = "兩相交直線";
        } else {
            if (Math.abs(eb - 90) < tol) type = "圓";
            else if (eb > a) type = "橢圓形";
            else if (Math.abs(eb - a) < tol) type = "拋物線";
            else type = "雙曲線";
        }

        document.getElementById('curveType').innerText = type;
        draw2D(type, a, eb, dist);
    }

    function draw2D(type, aDeg, bDeg, dist) {
        const canvas = document.getElementById('pCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,220,220);
        ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 3.5; ctx.fillStyle = "#00ffcc";
        const mid = 110, scale = 25;
        const alpha = aDeg * Math.PI/180, beta = bDeg * Math.PI/180;

        if (type === "圓") {
            ctx.beginPath(); ctx.arc(mid, mid, Math.max(0.5, Math.abs(dist * Math.tan(alpha) * scale)), 0, Math.PI*2); ctx.stroke();
        } else if (type === "一個點") {
            ctx.beginPath(); ctx.arc(mid, mid, 6, 0, Math.PI*2); ctx.fill();
        } else if (type === "一條直線") {
            ctx.beginPath(); ctx.moveTo(mid, 20); ctx.lineTo(mid, 200); ctx.stroke();
        } else if (type === "兩相交直線") {
            ctx.beginPath(); const s = Math.tan(alpha);
            ctx.moveTo(mid-100, mid-100*s); ctx.lineTo(mid+100, mid+100*s);
            ctx.moveTo(mid+100, mid-100*s); ctx.lineTo(mid-100, mid+100*s);
            ctx.stroke();
        } else if (type === "橢圓形") {
            ctx.beginPath();
            const e = Math.cos(beta) / Math.cos(alpha);
            const a = Math.abs(dist * Math.sin(alpha)*Math.cos(alpha) / (Math.pow(Math.sin(beta),2) - Math.pow(Math.sin(alpha),2)));
            const b = a * Math.sqrt(Math.max(0, Math.abs(1 - e*e)));
            ctx.ellipse(mid, mid, Math.min(90, a*scale), Math.min(90, b*scale), 0, 0, Math.PI*2); ctx.stroke();
        } else if (type === "拋物線") {
            ctx.beginPath(); 
            const p = Math.abs(dist * Math.sin(alpha));
            let first = true;
            for(let y = -95; y <= 95; y++) {
                const x = (y*y) / (4 * (p < 0.1 ? 0.1 : p) * scale); 
                if(first) { ctx.moveTo(mid + x, mid + y); first = false; } else ctx.lineTo(mid + x, mid + y);
            }
            ctx.stroke();
        } else if (type === "雙曲線") {
            const drawBranch = (s) => {
                ctx.beginPath(); let first = true;
                const e = Math.cos(beta) / Math.cos(alpha);
                const a = Math.abs(dist * Math.cos(alpha)*Math.sin(alpha) / (Math.pow(Math.sin(alpha),2) - Math.pow(Math.sin(beta),2)));
                const b = a * Math.sqrt(Math.max(0, Math.abs(e*e - 1)));
                for(let y = -95; y <= 95; y++) {
                    const x = a * Math.sqrt(1 + Math.pow(y / (Math.max(0.1, b * scale)), 2));
                    if(first) { ctx.moveTo(mid + s * x * scale, mid + y); first = false; }
                    else { ctx.lineTo(mid + s * x * scale, mid + y); }
                }
                ctx.stroke();
            };
            drawBranch(1); drawBranch(-1);
        }
    }

    // [核心修正] 精確的點點觸控邏輯
    params.forEach(p => {
        const s = document.getElementById(p + 'S'), n = document.getElementById(p + 'N');
        let isDragging = false, startX, initVal;

        s.addEventListener('touchstart', (e) => {
            const rect = s.getBoundingClientRect();
            const touchX = e.touches[0].clientX;
            const touchY = e.touches[0].clientY;
            
            // 計算目前圓點（Thumb）在畫面上的 X 位置
            const percent = (s.value - s.min) / (s.max - s.min);
            const thumbX = rect.left + (percent * rect.width);
            
            // 判定觸控點是否在圓點附近 (寬容度 40px)
            if (Math.abs(touchX - thumbX) < 40) {
                isDragging = true;
                startX = touchX;
                initVal = parseFloat(s.value);
            } else {
                // 如果點太遠，完全不啟動滑桿功能，讓事件傳給 UI 捲動
                isDragging = false;
            }
        }, { passive: true });

        s.addEventListener('touchmove', (e) => {
            if (!isDragging) return; // 沒抓到點，不處理

            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - e.touches[0].clientY; // 這裡不 care dy

            // 如果確定在拖拽，攔截所有滾動，確保滑動順暢
            if (e.cancelable) e.preventDefault();

            const rect = s.getBoundingClientRect();
            const range = parseFloat(s.max) - parseFloat(s.min);
            const newVal = Math.max(parseFloat(s.min), Math.min(parseFloat(s.max), initVal + (dx / rect.width) * range));
            
            s.value = newVal;
            n.value = Math.round(newVal * 10) / 10;
            update();
        }, { passive: false });

        s.addEventListener('touchend', () => { isDragging = false; });
        
        // 電腦版維持原樣
        s.addEventListener('input', () => { if (!getIsMobile()) { n.value = s.value; update(); } });
        n.addEventListener('change', () => { s.value = n.value; update(); });
    });

    window.addEventListener('resize', () => {
        isMobile = getIsMobile();
        const newAspect = isMobile ? (window.innerWidth / (window.innerHeight * 0.65)) : ((window.innerWidth - 210) / window.innerHeight);
        camera.aspect = newAspect; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    update(); animate();
</script>
</body>
</html>
